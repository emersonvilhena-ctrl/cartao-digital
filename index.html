<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="Emerson Luiz - ALT Energia Solar">
    <meta property="og:description" content="Financeiro | Clique para contatos e redes sociais.">
    <meta property="og:image" content="https://alternergiasolar.com.br/wp-content/uploads/2023/07/logo-alt-energia-solar.png">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://emersonvilhena-ctrl.github.io/cartao-digital/">

    <title>Emerson Luiz | ALT Energia Solar</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root {
            --laranja: #E35213;
            --azul: #1A305E;
            --branco: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: var(--branco);
            width: 100%;
            max-width: 350px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(26, 48, 94, 0.2);
            overflow: hidden;
            text-align: center;
            border-top: 10px solid var(--laranja);
        }

        .header {
            padding: 40px 20px 20px;
            background: #fff;
        }

        .logo {
            width: 200px;
            height: auto;
        }

        .info {
            padding: 0 20px 30px;
        }

        h2 {
            color: var(--azul);
            margin: 10px 0 5px;
            font-size: 26px;
        }

        .cargo {
            color: var(--laranja);
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: block;
            letter-spacing: 2px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            padding: 16px;
            margin: 12px 0;
            border-radius: 15px;
            font-weight: bold;
            transition: 0.3s;
            font-size: 16px;
            gap: 10px; /* Espaço entre ícone e texto */
        }

        /* Cores e Estilos Específicos */
        .whatsapp { background-color: #25D366; }
        .email { background-color: var(--azul); }
        /* Gradiente do Instagram mais moderno */
        .insta { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }

        .btn i {
            font-size: 20px;
        }

        .btn:hover { 
            transform: scale(1.02); 
            filter: brightness(1.1); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .footer {
            padding: 15px;
            font-size: 14px;
            color: var(--azul);
            background: #f9f9f9;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <a href="https://www.instagram.com/altenergiasolar" target="_blank">
            <img src="https://alternergiasolar.com.br/wp-content/uploads/2023/07/logo-alt-energia-solar.png" alt="ALT Energia Solar" class="logo">
        </a>
    </div>
    
    <div class="info">
        <h2>Emerson Luiz</h2>
        <span class="cargo">Financeiro</span>

        <a href="https://wa.me/5591992864243" class="btn whatsapp" target="_blank">
            <i class="fab fa-whatsapp"></i> WhatsApp (91) 99286-4243
        </a>

        <a href="https://wa.me/559133491126" class="btn whatsapp" target="_blank">
            <i class="fab fa-whatsapp"></i> WhatsApp (91) 3349-1126
        </a>

        <a href="mailto:emerson@altenergiasolar.com.br" class="btn email">
            <i class="far fa-envelope"></i> Enviar E-mail
        </a>

        <a href="https://www.instagram.com/altenergiasolar" class="btn insta" target="_blank">
            <i class="fab fa-instagram"></i> @altenergiasolar
        </a>
    </div>

    <div class="footer">
        www.alternergiasolar.com.br
    </div>
</div>

</body>
</html>
