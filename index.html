<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="Emerson Luiz - ALT Energia Solar">
    <meta property="og:description" content="Financeiro | Clique para contatos.">
    <meta property="og:image" content="https://emersonvilhena-ctrl.github.io/cartao-digital/logo.png">

    <title>Emerson Luiz | ALT</title>
    
    <style>
        :root { --laranja: #E35213; --azul: #1A305E; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; width: 100%; max-width: 350px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); text-align: center; overflow: hidden; border-bottom: 10px solid var(--laranja); }
        .header { padding: 35px 20px 20px; }
        /* Se a logo não carregar, este estilo garante que não fique um ícone feio */
        .logo { width: 180px; min-height: 50px; display: block; margin: 0 auto; }
        h2 { color: var(--azul); margin: 15px 0 5px; font-size: 26px; }
        .cargo { color: var(--laranja); font-weight: bold; font-size: 14px; text-transform: uppercase; margin-bottom: 25px; display: block; }
        .links { padding: 0 25px 35px; }
        .btn { display: flex; align-items: center; justify-content: center; text-decoration: none; color: white; padding: 16px; margin-bottom: 12px; border-radius: 15px; font-weight: bold; transition: 0.3s; }
        .whatsapp { background-color: #25D366; }
        .email { background-color: var(--azul); }
        .insta { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #bc1888); }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <a href="https://www.instagram.com/altenergiasolar">
            <img src="logo.png" alt="ALT Energia Solar" class="logo">
        </a>
        <h2>Emerson Luiz</h2>
        <span class="cargo">Financeiro</span>
    </div>
    
    <div class="links">
        <a href="https://wa.me/5591992864243" class="btn whatsapp">WhatsApp (91) 99286-4243</a>
        <a href="https://wa.me/559133491126" class="btn whatsapp">WhatsApp (91) 3349-1126</a>
        <a href="mailto:emerson@altenergiasolar.com.br" class="btn email">E-mail Profissional</a>
        <a href="https://www.instagram.com/altenergiasolar" class="btn insta">Instagram @altenergiasolar</a>
    </div>
</div>

</body>
</html>
