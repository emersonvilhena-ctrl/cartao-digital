<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Emerson Luiz | ALT Energia Solar</title>
    
    <meta property="og:type" content="website">
    <meta property="og:title" content="Emerson Luiz - ALT Energia Solar">
    <meta property="og:description" content="Financeiro | Clique para contatos e localização.">
    <meta property="og:url" content="https://emersonvilhena-ctrl.github.io/cartao-digital/">
    
    <meta property="og:image" content="https://emersonvilhena-ctrl.github.io/cartao-digital/logo.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:type" content="image/png">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://emersonvilhena-ctrl.github.io/cartao-digital/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root {
            --laranja: #E35213;
            --azul: #1A305E;
            --branco: #ffffff;
            --whatsapp: #25D366;
            --google-maps: #4285F4;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: var(--branco);
            width: 100%;
            max-width: 350px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(26, 48, 94, 0.2);
            overflow: hidden;
            text-align: center;
            border-top: 10px solid var(--laranja);
        }

        .header {
            padding: 30px 20px 10px;
        }

        .logo {
            width: 180px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .info {
            padding: 0 25px 30px;
        }

        h2 {
            color: var(--azul);
            margin: 10px 0 5px;
            font-size: 26px;
            font-weight: bold;
        }

        .cargo {
            color: var(--laranja);
            font-weight: bold;
            font-size: 13px;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: block;
            letter-spacing: 2px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            padding: 14px;
            margin: 12px 0;
            border-radius: 15px;
            font-weight: bold;
            transition: 0.3s;
            font-size: 14px;
            gap: 10px;
            word-break: break-all; /* Para o e-mail longo não sair do botão */
        }

        .save-contact {
            background-color: transparent;
            color: var(--azul);
            border: 2px solid var(--azul);
            margin-bottom: 20px;
        }
        .whatsapp { background-color: var(--whatsapp); }
        .email { background-color: var(--azul); }
        .insta { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .maps { background-color: var(--google-maps); }

        .btn:hover { transform: scale(1.02); filter: brightness(1.1); }
        .save-contact:hover { background-color: var(--azul); color: white; }

        .footer {
            padding: 15px;
            font-size: 14px;
            color: var(--azul);
            background: #f9f9f9;
            font-weight: bold;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <img src="logo.png" alt="ALT Energia Solar" class="logo">
    </div>
    
    <div class="info">
        <h2>Emerson Luiz</h2>
        <span class="cargo">Financeiro</span>

        <a href="contato.vcf" class="btn save-contact">
            <i class="fas fa-user-plus"></i> Salvar na Agenda
        </a>

        <a href="https://wa.me/5591992864243" class="btn whatsapp" target="_blank">
            <i class="fab fa-whatsapp"></i> WhatsApp (91) 99286-4243
        </a>

        <a href="mailto:emerson@altenergiasolar.com.br" class="btn email">
            <i class="fa-regular fa-envelope"></i> emerson@altenergiasolar.com.br
        </a>

        <a href="https://www.instagram.com/altenergiasolar" class="btn insta" target="_blank">
            <i class="fab fa-instagram"></i> @altenergiasolar
        </a>

        <a href="http://googleusercontent.com/maps.google.com/9" class="btn maps" target="_blank">
            <i class="fas fa-location-dot"></i> Como Chegar
        </a>
    </div>

    <div class="footer">
        www.alternergiasolar.com.br
    </div>
</div>

</body>
</html>
