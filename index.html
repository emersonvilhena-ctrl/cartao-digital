<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="Emerson Luiz - ALT Energia Solar">
    <meta property="og:description" content="Financeiro | Clique para contatos e redes sociais.">
    <meta property="og:image" content="https://alternergiasolar.com.br/wp-content/uploads/2023/07/logo-alt-energia-solar.png">
    <meta property="og:type" content="website">

    <title>Emerson Luiz | ALT Energia Solar</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root {
            --laranja: #E35213;
            --azul: #1A305E;
            --branco: #ffffff;
            --whatsapp: #25D366;
            --cinza-claro: #f0f2f5;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--cinza-claro);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: var(--branco);
            width: 100%;
            max-width: 360px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(26, 48, 94, 0.15);
            overflow: hidden;
            text-align: center;
            border-top: 10px solid var(--laranja);
        }

        .header {
            padding: 30px 20px 10px;
        }

        .logo {
            max-width: 180px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .info {
            padding: 0 25px 25px;
        }

        h2 {
            color: var(--azul);
            margin: 10px 0 5px;
            font-size: 26px;
            font-weight: bold;
        }

        .cargo {
            color: var(--laranja);
            font-weight: bold;
            font-size: 13px;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: block;
            letter-spacing: 2px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            padding: 12px;
            margin: 10px 0;
            border-radius: 12px;
            font-weight: bold;
            transition: 0.3s;
            font-size: 15px;
            gap: 10px;
        }

        /* Cores dos Botões */
        .whatsapp { background-color: var(--whatsapp); }
        .email { background-color: var(--azul); }
        .insta { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .maps { background-color: #4285F4; } /* Azul Google */
        
        /* Botão Salvar (Destaque diferente) */
        .save-contact {
            background-color: transparent;
            color: var(--azul);
            border: 2px solid var(--azul);
            margin-top: 15px;
        }

        .btn:hover { 
            transform: scale(1.02); 
            filter: brightness(1.1); 
        }

        .save-contact:hover {
            background-color: var(--azul);
            color: white;
        }

        .footer {
            padding: 15px;
            font-size: 13px;
            color: var(--azul);
            background: #f8f9fa;
            font-weight: bold;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <a href="https://alternergiasolar.com.br" target="_blank">
            <img src="https://alternergiasolar.com.br/wp-content/uploads/2023/07/logo-alt-energia-solar.png" alt="ALT Energia Solar" class="logo">
        </a>
    </div>
    
    <div class="info">
        <h2>Emerson Luiz</h2>
        <span class="cargo">Financeiro</span>

        <a href="contato.vcf" class="btn save-contact">
            <i class="fas fa-user-plus"></i> Salvar na Agenda
        </a>

        <a href="https://wa.me/5591992864243" class="btn whatsapp" target="_blank">
            <i class="fab fa-whatsapp"></i> WhatsApp (91) 99286-4243
        </a>

        <a href="https://wa.me/559133491126" class="btn whatsapp" target="_blank">
            <i class="fab fa-whatsapp"></i> WhatsApp (91) 3349-1126
        </a>

        <a href="mailto:emerson@altenergiasolar.com.br" class="btn email">
            <i class="fa-regular fa-envelope"></i> Enviar E-mail
        </a>

        <a href="https://www.instagram.com/altenergiasolar" class="btn insta" target="_blank">
            <i class="fab fa-instagram"></i> @altenergiasolar
        </a>

        <a href="https://maps.app.goo.gl/9Zp7W4kY8jM9yN9D7" class="btn maps" target="_blank">
            <i class="fas fa-location-dot"></i> Como Chegar (Belém)
        </a>
    </div>

    <div class="footer">
        www.alternergiasolar.com.br
    </div>
</div>

</body>
</html>
