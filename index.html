<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="Emerson Luiz - ALT Energia Solar">
    <meta property="og:description" content="Financeiro | Clique para falar comigo.">
    <meta property="og:image" content="https://emersonvilhena-ctrl.github.io/cartao-digital/logo.png">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://emersonvilhena-ctrl.github.io/cartao-digital/">

    <title>Emerson Luiz | ALT</title>
    
    <style>
        :root {
            --laranja: #E35213;
            --azul: #1A305E;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
        }
        .card {
            background: white;
            width: 100%;
            max-width: 340px;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            text-align: center;
            overflow: hidden;
            border-bottom: 10px solid var(--laranja);
        }
        .header { padding: 40px 20px 20px; }
        .logo { width: 180px; }
        h2 { color: var(--azul); margin: 10px 0 0; font-size: 26px; }
        .cargo { color: var(--laranja); font-weight: bold; font-size: 14px; text-transform: uppercase; margin-bottom: 30px; display: block; }
        .links { padding: 0 25px 30px; }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            padding: 18px;
            margin-bottom: 15px;
            border-radius: 15px;
            font-weight: bold;
            transition: 0.3s;
        }
        .whatsapp { background-color: #25D366; }
        .email { background-color: var(--azul); }
        .insta { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #bc1888); }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <a href="https://www.instagram.com/altenergiasolar">
            <img src="logo.png" alt="Logo ALT" class="logo">
        </a>
        <h2>Emerson Luiz</h2>
        <span class="cargo">Financeiro</span>
    </div>
    
    <div class="links">
        <a href="https://wa.me/5591992864243" class="btn whatsapp">WhatsApp Celular</a>
        <a href="https://wa.me/559133491126" class="btn whatsapp">WhatsApp Fixo</a>
        <a href="mailto:emerson@altenergiasolar.com.br" class="btn email">E-mail Profissional</a>
        <a href="https://www.instagram.com/altenergiasolar" class="btn insta">Instagram</a>
    </div>
</div>

</body>
</html>
