<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="Emerson Luiz - ALT Energia Solar">
    <meta property="og:description" content="Financeiro | Clique para contatos e redes sociais.">
    <meta property="og:image" content="https://alternergiasolar.com.br/wp-content/uploads/2023/07/logo-alt-energia-solar.png">
    <meta property="og:type" content="website">

    <title>Emerson Luiz | ALT Energia Solar</title>
    
    <style>
        :root {
            --laranja: #E35213;
            --azul-escuro: #1A305E;
            --branco: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: var(--branco);
            width: 320px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            overflow: hidden;
            text-align: center;
            border-top: 8px solid var(--laranja);
        }

        .header {
            padding: 25px 20px;
            background: #fff;
        }

        .logo {
            width: 160px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .info {
            padding: 0 20px 20px;
        }

        h2 {
            color: var(--azul-escuro);
            margin: 10px 0 5px;
            font-size: 22px;
        }

        .cargo {
            color: var(--laranja);
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: block;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            padding: 14px;
            margin: 10px 0;
            border-radius: 12px;
            font-weight: bold;
            transition: all 0.3s;
            font-size: 15px;
        }

        .whatsapp { background-color: #25D366; }
        .email { background-color: var(--azul-escuro); }
        .insta-btn { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }

        .btn:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        .footer {
            padding: 15px;
            font-size: 13px;
            color: var(--azul-escuro);
            background: #fdfdfd;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <a href="https://www.instagram.com/altenergiasolar" target="_blank">
            <img src="https://alternergiasolar.com.br/wp-content/uploads/2023/07/logo-alt-energia-solar.png" alt="ALT Energia Solar" class="logo">
        </a>
    </div>
    
    <div class="info">
        <h2>Emerson Luiz</h2>
        <span class="cargo">Financeiro</span>

        <a href="https://wa.me/5591992864243" class="btn whatsapp" target="_blank">
            WhatsApp (91) 99286-4243
        </a>

        <a href="https://wa.me/559133491126" class="btn whatsapp" target="_blank">
            WhatsApp (91) 3349-1126
        </a>

        <a href="mailto:emerson@altenergiasolar.com.br" class="btn email">
            emerson@altenergiasolar.com.br
        </a>

        <a href="https://www.instagram.com/altenergiasolar" class="btn insta-btn" target="_blank">
            @altenergiasolar
        </a>
    </div>

    <div class="footer">
        www.alternergiasolar.com.br
    </div>
</div>

</body>
</html>
